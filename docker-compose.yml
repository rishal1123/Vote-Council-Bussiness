version: "3.8"

services:
  votecouncil:
    build: .
    container_name: votecouncil
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/data
      - uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:///data/votecouncil.db
      - SECRET_KEY=change-this-in-production
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"
    restart: unless-stopped

volumes:
  db-data:
  uploads:
