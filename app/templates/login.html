{% extends "base.html" %}

{% block title %}Login - VoteCouncil{% endblock %}

{% block extra_css %}
<style>
    .login-wrapper {
        min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
        background: linear-gradient(160deg, #0D3B2E 0%, #105E48 35%, var(--mv-ocean-dark) 100%);
        position: relative;
    }
    .login-wrapper::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(ellipse at 30% 20%, rgba(16,185,129,0.15) 0%, transparent 50%),
                    radial-gradient(ellipse at 70% 80%, rgba(8,145,178,0.1) 0%, transparent 50%);
    }
    .login-box { width: 100%; max-width: 400px; position: relative; z-index: 1; }
    .login-card { border-radius: var(--radius-xl); box-shadow: var(--shadow-xl); border-top: 3px solid var(--mv-red); backdrop-filter: blur(20px); background: rgba(255,255,255,0.95); }
    .login-logo { width: 60px; height: 60px; border-radius: 16px; background: linear-gradient(135deg, var(--mv-green-dark), var(--mv-green-light)); display: inline-flex; align-items: center; justify-content: center; font-size: 1.6rem; color: white; box-shadow: 0 4px 14px rgba(5,150,105,0.3); }
    .login-title { color: var(--mv-900); font-weight: 700; font-size: 1.4rem; letter-spacing: -0.01em; }
    .login-btn { padding: 12px; font-size: 0.95rem; font-weight: 600; border-radius: var(--radius-sm); }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-box">
        <div class="card login-card">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <div class="login-logo mb-2">
                        <i class="bi bi-clipboard-check"></i>
                    </div>
                    <h2 class="login-title mt-2">VoteCouncil</h2>
                    <p class="text-muted small">Voter Management System</p>
                </div>

                {% if error %}
                <div class="alert alert-danger py-2 px-3 small">
                    <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="/auth/login">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="Enter username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="Enter password">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary login-btn w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
