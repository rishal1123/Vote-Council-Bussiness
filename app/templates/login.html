{% extends "base.html" %}

{% block title %}Login - VoteCouncil{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-5" style="border-top: 4px solid #D21034;">
                    <div class="text-center mb-4">
                        <div class="d-inline-block rounded-circle p-3 mb-2" style="background: linear-gradient(135deg, #007E3A, #00A64A);">
                            <i class="bi bi-clipboard-check text-white" style="font-size: 2.5rem;"></i>
                        </div>
                        <h2 class="mt-2" style="color: #1B2A4A;">VoteCouncil</h2>
                        <p class="text-muted">Voter Management System</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-circle"></i> {{ error }}
                    </div>
                    {% endif %}

                    <form method="POST" action="/auth/login">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control" id="username" name="username" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right"></i> Login
                        </button>
                    </form>
                </div>
            </div>
            <p class="text-center text-muted mt-3">
                <small>Default: admin / admin123</small>
            </p>
        </div>
    </div>
</div>
{% endblock %}
