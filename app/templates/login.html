{% extends "base.html" %}

{% block title %}Login - VoteCouncil{% endblock %}

{% block extra_css %}
<style>
    .login-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(160deg, var(--mv-dark) 0%, var(--mv-ocean-dark) 50%, var(--mv-ocean) 100%); }
    .login-box { width: 100%; max-width: 400px; }
    .login-card { border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); border-top: 4px solid var(--mv-red); }
    .login-logo { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--mv-green), #00A64A); display: inline-flex; align-items: center; justify-content: center; font-size: 1.8rem; color: white; }
    .login-title { color: var(--mv-dark); font-weight: 700; }
    .login-btn { padding: 12px; font-size: 1rem; font-weight: 600; border-radius: var(--radius-sm); }
</style>
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-box">
        <div class="card login-card">
            <div class="card-body p-4 p-sm-5">
                <div class="text-center mb-4">
                    <div class="login-logo mb-2">
                        <i class="bi bi-clipboard-check"></i>
                    </div>
                    <h2 class="login-title mt-2">VoteCouncil</h2>
                    <p class="text-muted small">Voter Management System</p>
                </div>

                {% if error %}
                <div class="alert alert-danger py-2 px-3 small">
                    <i class="bi bi-exclamation-circle me-1"></i> {{ error }}
                </div>
                {% endif %}

                <form method="POST" action="/auth/login">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="Enter username">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="Enter password">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary login-btn w-100">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
