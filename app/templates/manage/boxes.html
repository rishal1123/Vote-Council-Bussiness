{% extends "base.html" %}

{% block title %}Boxes - VoteCouncil{% endblock %}

{% block content %}
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 mb-0">
            <i class="bi bi-box"></i> Boxes
        </h1>
        <button class="btn btn-primary" onclick="showAddModal()">
            <i class="bi bi-plus-lg"></i> Add Box
        </button>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Name</th>
                            <th class="d-none d-md-table-cell">Location</th>
                            <th class="text-center">Voters</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="boxList">
                        <tr>
                            <td colspan="4" class="text-center py-5">
                                <div class="spinner-border text-primary" role="status"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal fade" id="boxModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add Box</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="boxForm">
                    <input type="hidden" id="boxId">
                    <div class="mb-3">
                        <label for="boxName" class="form-label">Name *</label>
                        <input type="text" class="form-control" id="boxName" required>
                    </div>
                    <div class="mb-3">
                        <label for="boxLocation" class="form-label">Location</label>
                        <input type="text" class="form-control" id="boxLocation">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveBox()">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let boxes = [];
const modal = new bootstrap.Modal(document.getElementById('boxModal'));

document.addEventListener('DOMContentLoaded', loadBoxes);

async function loadBoxes() {
    const response = await fetch('/boxes');
    boxes = await response.json();
    renderBoxes();
}

function renderBoxes() {
    const tbody = document.getElementById('boxList');

    if (boxes.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-5">No boxes found</td></tr>';
        return;
    }

    tbody.innerHTML = boxes.map(box => `
        <tr>
            <td><strong>${box.name}</strong></td>
            <td class="d-none d-md-table-cell">${box.location || '-'}</td>
            <td class="text-center">
                <a href="/voters/list?box_id=${box.id}" class="badge bg-primary">${box.voter_count}</a>
            </td>
            <td class="text-center">
                <button class="btn btn-sm btn-outline-primary" style="min-height:38px" onclick="showEditModal(${box.id})">
                    <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-outline-danger" style="min-height:38px" onclick="deleteBox(${box.id})">
                    <i class="bi bi-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

function showAddModal() {
    document.getElementById('modalTitle').textContent = 'Add Box';
    document.getElementById('boxId').value = '';
    document.getElementById('boxName').value = '';
    document.getElementById('boxLocation').value = '';
    modal.show();
}

function showEditModal(id) {
    const box = boxes.find(b => b.id === id);
    document.getElementById('modalTitle').textContent = 'Edit Box';
    document.getElementById('boxId').value = box.id;
    document.getElementById('boxName').value = box.name;
    document.getElementById('boxLocation').value = box.location || '';
    modal.show();
}

async function saveBox() {
    const id = document.getElementById('boxId').value;
    const data = {
        name: document.getElementById('boxName').value,
        location: document.getElementById('boxLocation').value || null
    };

    const url = id ? `/boxes/${id}` : '/boxes';
    const method = id ? 'PUT' : 'POST';

    try {
        const response = await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            modal.hide();
            loadBoxes();
            showToast(id ? 'Box updated' : 'Box created', 'success');
        } else {
            const error = await response.json();
            showToast(error.detail || 'Failed to save box', 'danger');
        }
    } catch (error) {
        showToast('Error saving box', 'danger');
    }
}

async function deleteBox(id) {
    if (!confirm('Are you sure you want to delete this box?')) return;

    try {
        const response = await fetch(`/boxes/${id}`, { method: 'DELETE' });

        if (response.ok) {
            loadBoxes();
            showToast('Box deleted', 'success');
        } else {
            const error = await response.json();
            showToast(error.detail || 'Failed to delete box', 'danger');
        }
    } catch (error) {
        showToast('Error deleting box', 'danger');
    }
}
</script>
{% endblock %}
